<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生写真コレクション</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f4f4f8;
  padding-bottom:70px;
}

/* ===== アプリヘッダー ===== */
.app-header{
  text-align:center;
  padding:18px 0 8px;
}
.app-icon{
  width:70px;height:70px;
  margin:auto;
  border-radius:18px;
  background:linear-gradient(135deg,#111827,#374151);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
.app-title{font-size:18px;font-weight:700;margin-top:8px;}
.app-sub{font-size:12px;color:#6b7280}

/* ===== 上ボタン ===== */
.topbar{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}
.chip{
  flex:0 0 auto;
  padding:10px 14px;
  border-radius:999px;
  border:none;
  background:white;
  font-weight:600;
  font-size:13px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.chip:active{transform:scale(0.95)}
.chip.active{background:#111827;color:white}

/* ===== グリッド ===== */
#grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
}

/* カード */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  user-select:none;
}

/* 画像 */
.thumb{
  width:100%;
  height:110px;
  object-fit:cover;
}
.thumb.empty{
  height:110px;
  background:#e5e7eb;
}

/* 名前 */
.name{
  font-size:11px;
  text-align:center;
  padding:6px;
}

/* コンプリート */
.overlay{
  position:absolute;
  top:6px;
  right:6px;
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:999px;
}

/* ===== 所持ボタン ===== */
.items{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:4px;
  padding:6px;
}

.item{
  font-size:10px;
  text-align:center;
  padding:6px 0;
  border-radius:8px;
  background:#f3f4f6;
  color:#6b7280;
  transition:0.15s;
}

.item.on{
  background:#111827;
  color:white;
}

.item:active{
  transform:scale(0.95);
}

/* ===== 下タブ ===== */
.tabbar{
  position:fixed;
  bottom:0;left:0;right:0;
  height:64px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(0,0,0,0.08);
}

.tab{
  text-align:center;
  font-size:11px;
  color:#6b7280;
  flex:1;
}
.tab span{display:block;font-size:10px;margin-top:2px}
.tab.active{color:#111827;transform:scale(1.05)}
.tab:active{transform:scale(0.92)}
</style>
</head>

<body>

<!-- ヘッダー -->
<div class="app-header">
  <div class="app-icon">📸</div>
  <div class="app-title">生写真コレクション</div>
  <div class="app-sub">長押しで画像登録・タップで管理</div>
</div>

<!-- モード -->
<div class="topbar">
  <button class="chip" onclick="setMode('all')">📦 全部</button>
  <button class="chip" onclick="setMode('unowned')">🔍 未所持</button>
  <button class="chip" onclick="setMode('complete')">🏆 コンプ</button>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<div id="grid"></div>

<!-- 下タブ -->
<div class="tabbar">
  <div class="tab active" onclick="setMode('all')">📷<span>すべて</span></div>
  <div class="tab" onclick="setMode('unowned')">🔍<span>未所持</span></div>
  <div class="tab" onclick="setMode('complete')">🏆<span>コンプ</span></div>
</div>

<script>

/* ===== データ ===== */

"冬服",

"福袋2026 2025年に発売したMV衣装生写真のアザーカット",

"スタイリング制服",
"2026年 バレンタインコーデ",
"ジャージ",
"スタジャンコーデ",
"5th TOUR 2025 “Addiction” ドーム衣装」シルバー衣装",
"14th Single『The growing up train』封入",
"5th Anniversaryドレス",
"「4th YEAR ANNIVERSARY LIVE」オープニング衣装",
"5th TOUR 2025 “Addiction” 」オープニング衣装",
"ルームウェア",
];

let data = JSON.parse(localStorage.getItem("photo_app_v4")) || {};
let mode = "all";
let selectedSeries = null;
let pressTimer = null;

/* 初期化 */
seriesList.forEach(s=>{
  if(!data[s]){
    data[s] = {
      image:"",
      items:{ヨリ:false,チュウ:false,ヒキ:false,座り:false}
    };
  }
});

function save(){
  localStorage.setItem("photo_app_v4",JSON.stringify(data));
}

/* ===== モード ===== */
function setMode(m){
  mode = m;

  document.querySelectorAll(".chip").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if(m==="all"){
    document.querySelectorAll(".chip")[0].classList.add("active");
    document.querySelectorAll(".tab")[0].classList.add("active");
  }
  if(m==="unowned"){
    document.querySelectorAll(".chip")[1].classList.add("active");
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
  if(m==="complete"){
    document.querySelectorAll(".chip")[2].classList.add("active");
    document.querySelectorAll(".tab")[2].classList.add("active");
  }

  render();
}

/* ===== 画像登録（長押し） ===== */
document.getElementById("fileInput").onchange = (e)=>{
  const file = e.target.files[0];
  if(!file || !selectedSeries) return;

  const reader = new FileReader();
  reader.onload = ()=>{
    data[selectedSeries].image = reader.result;
    save();
    render();
  };
  reader.readAsDataURL(file);
};

/* ===== 所持ボタン ===== */
function itemButton(type, state){
  return `<div class="item ${state?'on':''}" data-type="${type}">${type}</div>`;
}

/* ===== 描画 ===== */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  Object.entries(data).forEach(([series,obj])=>{

    const miss = Object.values(obj.items).filter(v=>!v).length;

    if(mode==="unowned" && miss===0) return;
    if(mode==="complete" && miss!==0) return;

    const div = document.createElement("div");
    div.className="card";

    /* 長押し */
    div.ontouchstart = div.onmousedown = ()=>{
      pressTimer = setTimeout(()=>{
        selectedSeries = series;
        document.getElementById("fileInput").click();
      },600);
    };
    div.ontouchend = div.onmouseup = div.onmouseleave = ()=>{
      clearTimeout(pressTimer);
    };

    div.innerHTML = `
      <div style="position:relative">
        ${obj.image ? `<img src="${obj.image}" class="thumb">` : `<div class="thumb empty"></div>`}
        <div class="overlay">${miss===0?"🏆":""}</div>
      </div>

      <div class="name">${series}</div>

      <div class="items">
        ${itemButton("ヨリ", obj.items.ヨリ)}
        ${itemButton("チュウ", obj.items.チュウ)}
        ${itemButton("ヒキ", obj.items.ヒキ)}
        ${itemButton("座り", obj.items.座り)}
      </div>
    `;

    /* クリック処理 */
    div.querySelectorAll(".item").forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        const type = el.dataset.type;
        data[series].items[type] = !data[series].items[type];
        save();
        render();
      };
    });

    grid.appendChild(div);
  });
}

render();

</script>

</body>
</html>
